<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light only" />
  <title>프로젝트 상세 — LG SW Bootcamp 2026</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" />
  <link rel="stylesheet" href="../css/style.css?v=8" />
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="../index.html" class="nav-logo"><strong>LG SW Bootcamp</strong><small>2026 · 13기</small></a>
      <nav class="nav-links" id="nav-links">
        <a href="../index.html">← 목록</a>
      </nav>
    </div>
  </nav>

  <section class="detail-hero">
    <div class="container-wide">
      <a href="../index.html" class="detail-back" id="detail-back">← 목록으로 돌아가기</a>
      <div class="detail-eyebrow" id="detail-eyebrow"></div>
      <div id="detail-award"></div>
      <h1 class="detail-title" id="detail-title">로딩 중…</h1>
      <p class="detail-team" id="detail-team"></p>
    </div>
  </section>

  <section class="detail-body">
    <div class="container-wide">
      <div class="detail-grid">
        <div>
          <div class="detail-poster-wrap" id="detail-poster-wrap" style="display:none"></div>
          <div class="video-frame" id="detail-video-wrap" style="display:none">
            <div class="win-chrome"><span class="traffic r"></span><span class="traffic y"></span><span class="traffic g"></span><span class="url">demo</span></div>
            <video id="detail-video" controls>브라우저가 이 동영상 형식을 지원하지 않습니다.</video>
          </div>

          <p class="detail-desc" id="detail-desc"></p>

          <div id="detail-tech-block" style="display:none">
            <div class="detail-subhead">핵심 기술</div>
            <ul class="tech-list" id="detail-tech"></ul>
          </div>

          <div class="detail-nav" id="detail-nav"></div>
        </div>

        <aside class="detail-side">
          <div class="info-block" id="detail-members-block">
            <div class="info-label">Team</div>
            <div class="members" id="detail-members"></div>
          </div>
          <div class="info-block">
            <div class="info-label">Materials</div>
            <div class="links" id="detail-links"></div>
          </div>
        </aside>
      </div>
    </div>
  </section>

  <!-- Lightbox (poster enlarge) -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lb-close" id="lb-close" aria-label="닫기">×</button>
    <button class="lb-nav lb-prev" id="lb-prev" aria-label="이전 포스터">‹</button>
    <img class="lb-img" id="lb-img" alt="포스터 확대 이미지" />
    <button class="lb-nav lb-next" id="lb-next" aria-label="다음 포스터">›</button>
    <div class="lb-count" id="lb-count"></div>
  </div>

  <footer>
    <div class="copyright">LG ELECTRONICS · SW COLLEGE — BOOTCAMP 2026 · 13기</div>
  </footer>

  <script src="../js/data-loader.js?v=5"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await DataLoader.load();
      const id = new URLSearchParams(location.search).get('id');
      if (!id) { location.href = '../index.html'; return; }
      const p = DataLoader.getProject(id);
      if (!p) { document.getElementById('detail-title').textContent = '프로젝트를 찾을 수 없습니다.'; return; }
      const cohort = p.cohort;

      document.title = `${p.title} — LG SW Bootcamp 2026`;
      document.getElementById('detail-eyebrow').textContent = DataLoader.metaLine(p);
      document.getElementById('detail-title').textContent = p.title;
      document.getElementById('detail-team').textContent = DataLoader.teamMembers(p);
      document.getElementById('detail-desc').textContent = p.description || p.summary || '';

      if (p.award) {
        document.getElementById('detail-award').innerHTML = `<span class="detail-award-badge">◆ ${p.award}</span>`;
      }

      // return to referring list if we came from one
      const back = document.getElementById('detail-back');
      if (document.referrer && document.referrer.includes(location.host)) {
        back.addEventListener('click', e => { e.preventDefault(); history.back(); });
      }

      // members
      const mBlock = document.getElementById('detail-members-block');
      if (p.members && p.members.length) {
        document.getElementById('detail-members').innerHTML = p.members.map(m => `<span class="member">${m}</span>`).join('');
      } else { mBlock.style.display = 'none'; }

      // core tech
      if (p.tech_highlights && p.tech_highlights.length) {
        document.getElementById('detail-tech').innerHTML = p.tech_highlights.map(t => `<li>${t}</li>`).join('');
        document.getElementById('detail-tech-block').style.display = 'block';
      }

      // materials
      const labels = { spec: '요구사항 명세서', video: '시연 영상', report: '결과보고서', poster: '포스터', github: 'GitHub', demo: 'Demo' };
      const links = Object.entries(p.links).filter(([k, v]) => v && k !== 'poster_image' && k !== 'poster_images')
        .map(([k, v]) => `<a href="${DataLoader.resolveAsset(v)}" target="_blank" rel="noopener" class="link-item">${labels[k] || k} <span style="margin-left:auto;color:var(--ink-500)">↗</span></a>`).join('');
      document.getElementById('detail-links').innerHTML = links || '<span style="color:var(--ink-500);font-size:14px">자료 없음</span>';

      // poster(s) — show every page, click to enlarge
      const posters = (p.links.poster_images && p.links.poster_images.length)
        ? p.links.poster_images
        : (p.links.poster_image ? [p.links.poster_image] : []);
      const lbSrcs = posters.map(s => DataLoader.resolveAsset(s));
      if (posters.length) {
        const wrap = document.getElementById('detail-poster-wrap');
        wrap.innerHTML = posters.map((src, i) => {
          const label = posters.length > 1
            ? `<div class="poster-pageno">${String(i + 1).padStart(2, '0')} / ${String(posters.length).padStart(2, '0')}</div>` : '';
          return `${label}<img class="detail-poster-img" src="${lbSrcs[i]}" alt="${p.title} 포스터 ${i + 1}" loading="lazy">`;
        }).join('');
        wrap.style.display = 'block';
        wrap.querySelectorAll('.detail-poster-img').forEach((im, i) => im.addEventListener('click', () => openLightbox(i)));
      }
      // video (framed in browser chrome) — with graceful fallback
      // (GitHub Pages can't serve the Git-LFS video files, so degrade nicely)
      if (p.links.video) {
        const vwrap = document.getElementById('detail-video-wrap');
        const vid = document.getElementById('detail-video');
        vid.src = DataLoader.resolveAsset(p.links.video);
        vwrap.style.display = 'block';
        vid.addEventListener('error', () => {
          vwrap.innerHTML = '<div class="video-fallback">⚠️ 이 환경에서는 시연 영상을 재생할 수 없습니다.<br>포스터로 프로젝트를 확인하시거나, 전체 영상은 자체 호스팅 사이트에서 재생됩니다.</div>';
        }, { once: true });
      }

      // prev / next within cohort
      const list = cohort.projects;
      const i = list.findIndex(x => x.id === id);
      const prev = i > 0 ? list[i - 1] : null;
      const next = i < list.length - 1 ? list[i + 1] : null;
      let nav = prev ? `<a href="detail.html?id=${prev.id}"><span>← 이전</span><strong>${prev.title}</strong></a>` : '<span></span>';
      if (next) nav += `<a href="detail.html?id=${next.id}" style="text-align:right"><span>다음 →</span><strong>${next.title}</strong></a>`;
      document.getElementById('detail-nav').innerHTML = nav;

      // ---- Lightbox: click a poster to enlarge ----
      const lb = document.getElementById('lightbox');
      const lbImg = document.getElementById('lb-img');
      const lbCount = document.getElementById('lb-count');
      const lbPrev = document.getElementById('lb-prev');
      const lbNext = document.getElementById('lb-next');
      let lbIdx = 0;
      function lbShow() {
        lbImg.src = lbSrcs[lbIdx];
        const multi = lbSrcs.length > 1;
        lbCount.textContent = multi ? `${lbIdx + 1} / ${lbSrcs.length}` : '';
        lbPrev.style.display = lbNext.style.display = multi ? 'flex' : 'none';
      }
      function openLightbox(idx) {
        lbIdx = idx; lbShow();
        lb.classList.add('open'); lb.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
      }
      function closeLightbox() {
        lb.classList.remove('open'); lb.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = ''; lbImg.removeAttribute('src');
      }
      function lbMove(d) { lbIdx = (lbIdx + d + lbSrcs.length) % lbSrcs.length; lbShow(); }
      window.openLightbox = openLightbox; // used by poster click handlers above
      lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
      lbImg.addEventListener('click', e => e.stopPropagation());
      document.getElementById('lb-close').addEventListener('click', closeLightbox);
      lbPrev.addEventListener('click', e => { e.stopPropagation(); lbMove(-1); });
      lbNext.addEventListener('click', e => { e.stopPropagation(); lbMove(1); });
      document.addEventListener('keydown', e => {
        if (!lb.classList.contains('open')) return;
        if (e.key === 'Escape') closeLightbox();
        else if (e.key === 'ArrowLeft') lbMove(-1);
        else if (e.key === 'ArrowRight') lbMove(1);
      });
    });
  </script>
</body>
</html>
